services:
  - type: web
    name: gym-api-web
    runtime: docker
    region: oregon
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /v1/health
    autoDeploy: true
    envVars:
      - key: APP_NAME
        value: Gym API
      - key: APP_ENV
        value: development
      - key: APP_DEBUG
        value: "false"
      - key: API_V1_PREFIX
        value: /v1
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "30"
      - key: ENABLE_EMAIL_VERIFICATION
        value: "false"
      - key: ALLOW_INMEMORY_RATE_LIMIT_FALLBACK
        value: "false"
      - key: FREE_COOLDOWN_DAYS
        value: "15"
      - key: ENABLE_SQL_IMPORT_ENDPOINT
        value: "true"
      - key: ADMIN_IMPORT_KEY
        generateValue: true
      - key: MAX_LOGIN_ATTEMPTS_PER_15_MIN
        value: "10"
      - key: MAX_REGISTER_ATTEMPTS_PER_HOUR
        value: "100"
      - key: MAX_PLAN_GENERATIONS_PER_MIN
        value: "20"
      - key: STORAGE_PROVIDER
        value: local
      - key: LOCAL_STORAGE_PATH
        value: ./storage
      - key: PAYMENT_PROVIDER
        value: stripe
      - key: CORS_ORIGINS
        value: https://xanderssj.xyz,http://localhost:3000,http://localhost:5173
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: gym-api-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: gym-api-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: gym-api-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: gym-api-redis
          property: connectionString

  - type: worker
    name: gym-api-worker
    runtime: docker
    region: oregon
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerCommand: celery -A app.workers.celery_app.celery_app worker --loglevel=info
    autoDeploy: true
    envVars:
      - key: APP_NAME
        value: Gym API
      - key: APP_ENV
        value: development
      - key: APP_DEBUG
        value: "false"
      - key: API_V1_PREFIX
        value: /v1
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "30"
      - key: ENABLE_EMAIL_VERIFICATION
        value: "false"
      - key: ALLOW_INMEMORY_RATE_LIMIT_FALLBACK
        value: "false"
      - key: FREE_COOLDOWN_DAYS
        value: "15"
      - key: ENABLE_SQL_IMPORT_ENDPOINT
        value: "true"
      - key: ADMIN_IMPORT_KEY
        fromService:
          type: web
          name: gym-api-web
          envVarKey: ADMIN_IMPORT_KEY
      - key: MAX_LOGIN_ATTEMPTS_PER_15_MIN
        value: "10"
      - key: MAX_REGISTER_ATTEMPTS_PER_HOUR
        value: "100"
      - key: MAX_PLAN_GENERATIONS_PER_MIN
        value: "20"
      - key: STORAGE_PROVIDER
        value: local
      - key: LOCAL_STORAGE_PATH
        value: ./storage
      - key: PAYMENT_PROVIDER
        value: stripe
      - key: CORS_ORIGINS
        value: https://xanderssj.xyz,http://localhost:3000,http://localhost:5173
      - key: SECRET_KEY
        fromService:
          type: web
          name: gym-api-web
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: gym-api-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: gym-api-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: gym-api-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: gym-api-redis
          property: connectionString

  - type: keyvalue
    name: gym-api-redis
    region: oregon
    plan: starter
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

databases:
  - name: gym-api-db
    plan: basic-256mb
    region: oregon
